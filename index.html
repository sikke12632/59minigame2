<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>우리반 게임 라운지</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-bg" aria-hidden="true">
    <div class="shape shape-a"></div>
    <div class="shape shape-b"></div>
    <div class="shape shape-c"></div>
  </div>

  <main id="app">
    <section id="loginScreen" class="screen auth-screen">
      <div class="brand-mark">2</div>
      <h1>우리반 게임 라운지</h1>
      <form id="loginForm" class="login-panel">
        <label>
          <span>입장코드</span>
          <input id="classCodeInput" type="password" autocomplete="off" maxlength="24" required>
        </label>
        <label>
          <span>학번 + 이름</span>
          <input id="studentNameInput" type="text" autocomplete="off" maxlength="12" required placeholder="5101홍길동">
        </label>
        <button class="primary-action" type="submit">입장</button>
      </form>
      <p id="loginStatus" class="status-line"></p>
    </section>

    <section id="hubScreen" class="screen hub-screen hidden">
      <header class="app-header">
        <div>
          <p class="eyebrow">Class Lounge</p>
          <h2 id="welcomeTitle">어서 와</h2>
        </div>
        <button id="logoutBtn" class="icon-button" type="button" title="로그아웃">×</button>
      </header>

      <section class="stats-grid" aria-label="내 기록">
        <article>
          <span>총점</span>
          <strong id="totalScore">0</strong>
        </article>
        <article>
          <span>순위</span>
          <strong id="myRank">-</strong>
        </article>
        <article>
          <span>티켓</span>
          <strong id="ticketCount">3</strong>
        </article>
      </section>

      <section class="game-grid" aria-label="게임 선택">
        <button class="game-card nono-card" type="button" data-game="nono">
          <span class="game-icon">▦</span>
          <span>
            <strong>네모네모</strong>
            <small id="nonoProgressText">0 / 1000</small>
          </span>
        </button>
        <button class="game-card pipe-card" type="button" data-game="pipe">
          <span class="game-icon">⌁</span>
          <span>
            <strong>배관공</strong>
            <small id="pipeProgressText">0 / 1000</small>
          </span>
        </button>
        <button class="game-card g2048-card" type="button" data-game="g2048">
          <span class="game-icon">2048</span>
          <span>
            <strong>2048</strong>
            <small id="g2048ProgressText">0 / 1000</small>
          </span>
        </button>
        <button class="game-card mine-card" type="button" data-game="mine">
          <span class="game-icon">✦</span>
          <span>
            <strong>지뢰찾기</strong>
            <small id="mineProgressText">0 / 1000</small>
          </span>
        </button>
      </section>

      <section class="leaderboard-panel">
        <div class="panel-title">
          <h3>이번 시즌 랭킹</h3>
          <button id="refreshRankingBtn" class="text-button" type="button">새로고침</button>
        </div>
        <ol id="leaderboardList" class="leaderboard-list"></ol>
      </section>
    </section>

    <section id="gameScreen" class="screen game-screen hidden">
      <header class="game-header">
        <button id="backToHubBtn" class="icon-button" type="button" title="돌아가기">‹</button>
        <div>
          <p id="gameKicker" class="eyebrow">Game</p>
          <h2 id="gameTitle">게임</h2>
        </div>
        <div class="mini-stat">티켓 <strong id="gameTicketCount">3</strong></div>
      </header>

      <div id="difficultyPanel" class="difficulty-panel"></div>
      <div id="gamePanel" class="play-panel hidden"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden" role="status"></div>
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loader"></div>
    <span id="loadingText">불러오는 중</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
